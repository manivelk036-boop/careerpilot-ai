# ============================================================
# CareerPilot AI — Spring Boot Configuration
# ============================================================
# On Railway: set MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD env vars
# Locally (no env vars set): falls back to H2 file database
# ============================================================

server.port=${PORT:8080}

# ─── Database ────────────────────────────────────────────────
# Railway MySQL: set MYSQL_URL=jdbc:mysql://host:port/dbname?useSSL=false&allowPublicKeyRetrieval=true
# Local H2 fallback used automatically when MYSQL_URL is not set
spring.datasource.url=${MYSQL_URL:jdbc:h2:file:./data/careerpilot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${MYSQL_USER:sa}
spring.datasource.password=${MYSQL_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (local dev only — disable on production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ─── JWT ─────────────────────────────────────────────────────
# On Railway: set JWT_SECRET to a long random string (64+ chars)
jwt.secret=${JWT_SECRET:CareerPilotAI2026VeryLongSecureSecretKeyForJWTSigningHMACSHA512ExtraPaddingToEnsureItIsOver512Bits}
jwt.expiration.ms=${JWT_EXPIRY_MS:86400000}

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.careerpilot=INFO
logging.level.org.springframework.security=WARN
