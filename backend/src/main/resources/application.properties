server.port=${PORT:8080}

# ─── Database defaults (Local H2 fallback) ────────────────────
# This ensures the app starts up immediately in any environment.
# To override with MySQL on Railway, add these Env Variables:
# - SPRING_DATASOURCE_URL = jdbc:mysql://YOUR_HOST:YOUR_PORT/YOUR_DB
# - SPRING_DATASOURCE_USERNAME = YOUR_USER
# - SPRING_DATASOURCE_PASSWORD = YOUR_PASSWORD
# - SPRING_DATASOURCE_DRIVER_CLASS_NAME = com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:h2:file:./careerpilot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─── Hibernate / JPA ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── H2 Console ───────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ─── JWT Security ─────────────────────────────────────────────
# HS512 requires at least 64 bytes (512 bits) of key length
jwt.secret=${JWT_SECRET:CareerPilotAI2026VeryLongSecureSecretKeyForJWTSigningHMACSHA512ExtraPaddingToEnsureItIsOver512Bits}
jwt.expiration.ms=${JWT_EXPIRY_MS:86400000}

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.careerpilot=INFO
logging.level.org.springframework.security=WARN
